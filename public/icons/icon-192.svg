<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- 배경 -->
  <rect width="192" height="192" rx="32" fill="#FF6B6B"/>

  <!-- ㅇ → 이유식 공기 그릇 -->
  <!-- 그릇 몸통 (흰색 채움 실루엣) -->
  <path d="M 60 44 C 58 70 71 85 96 87 C 121 85 134 70 132 44 Z" fill="white"/>
  <!-- 그릇 입구 (배경색 타원으로 깊이감 표현) -->
  <ellipse cx="96" cy="44" rx="36" ry="9" fill="#FF6B6B"/>
  <!-- 그릇 테두리 (흰색 선) -->
  <ellipse cx="96" cy="44" rx="36" ry="9" fill="none" stroke="white" stroke-width="5"/>
  <!-- 쌀 (그릇 안쪽 장식) -->
  <circle cx="86" cy="43" r="3" fill="white" opacity="0.75"/>
  <circle cx="96" cy="40" r="2.5" fill="white" opacity="0.75"/>
  <circle cx="106" cy="43" r="3" fill="white" opacity="0.75"/>
  <!-- 그릇 받침 (좁은) -->
  <rect x="84" y="85" width="24" height="5" rx="2.5" fill="white"/>
  <!-- 그릇 받침 (넓은 발) -->
  <rect x="77" y="89" width="38" height="4" rx="2" fill="white"/>

  <!-- ㅜ → 왼쪽 포크 + 오른쪽 숟가락 -->
  <!-- 가로 줄기 -->
  <line x1="44" y1="126" x2="148" y2="126" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
  <!-- 세로 줄기 (중앙 아래로) -->
  <line x1="96" y1="126" x2="96" y2="168" stroke="white" stroke-width="6.5" stroke-linecap="round"/>

  <!-- 포크 살(tines) 3개: 가로 줄기 왼쪽 위로 뻗음 -->
  <line x1="53" y1="126" x2="51" y2="108" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="65" y1="126" x2="63" y2="104" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="77" y1="126" x2="75" y2="108" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- 숟가락 머리 (타원): 가로 줄기 오른쪽 위로 뻗음 -->
  <ellipse cx="129" cy="112" rx="16" ry="12" fill="white"/>
</svg>
